# Render Blueprint — Sirahos API
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sirahos-api
    runtime: node
    region: singapore  # Closest to ap-northeast-1 Supabase
    plan: free         # Change to "starter" or "standard" for production
    buildCommand: cd server && npm install && npx prisma generate && npm run build
    startCommand: cd server && npx prisma migrate deploy && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"   # Render default port
      - key: DATABASE_URL
        sync: false      # Set in Render dashboard
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: CORS_ORIGIN
        sync: false      # Set to your Vercel frontend URL
      - key: LEADS_SUPABASE_URL
        sync: false
      - key: LEADS_SUPABASE_KEY
        sync: false
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        sync: false
